<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Desktop Chat UI</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">

    <div class="sidebar-header">
      Chats
    </div>

    <div class="chat-list">

      <div class="chat-item active">
        <div class="avatar"></div>
        <div>
          <h4>John</h4>
          <p>Hey👋</p>
        </div>
      </div>

    </div>

  </div>

  <!-- ===== CHAT AREA ===== -->
  <div class="chat-area">

    <!-- Header -->
    <div class="chat-header">
      <div class="avatar"></div>
      <div>
        <h3>John</h3>
        <span>Online</span>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-box">

      <div class="msg left">
        <p>Hey 👋</p>
        <span>10:30</span>
      </div>

      <div class="msg right">
        <p>This UI looks insane 🔥</p>
        <span>10:31</span>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input type="text" placeholder="Type a message..." id="message">
      <button type="submit" onclick="handleMessageSubmit(event)">➤</button>
    </div>

  </div>

</div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="chat.js"></script>

</body>
</html>
