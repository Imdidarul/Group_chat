<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Desktop Chat UI</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <div class="join-room">
      <input style="height: 25px;" type="text" placeholder="Enter phone number" id="roomName">
      <button id="exitRoom" disabled="disabled" style="color: red;">Exit Room</button>
    </div>

    <div class="sidebar-header">
      Chats
    </div>

    <div class="chat-list">

      <div class="chat-item active">
        <div class="avatar"></div>
        <div>
          <h4>Global</h4>
          <!-- <p>Hey👋</p> -->
        </div>
      </div>

    </div>

  </div>

  <!-- ===== CHAT AREA ===== -->
  <div class="chat-area">

    <!-- Header -->
    <div class="chat-header">
      <div class="avatar"></div>
      <div>
        <h3>Global</h3>
        <!-- <span>Online</span> -->
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-box">

      <div class="msg left">
        <p>Welcome</p>
        <span>10:30</span>
      </div>

      <div class="msg right">
        <p>To this App</p>
        <span>10:31</span>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input type="text" placeholder="Type a message..." id="message">
      <button type="submit" onclick="handleMessageSubmit(event)">➤</button>
      <button type="button" onclick="openUploadPopup()">📎</button>
    </div>

    <div id="uploadPopup" class="popup">
      <div class="popup-content">
        <span class="close" onclick="closeUploadPopup()">&times;</span>
        <h3>Upload File</h3>
        <form id="uploadForm">
          <input type="file" id="fileInput" accept="image/*, video/*, audio/*" required>
          <button type="submit"> Upload </button>
        </form>
      </div>

    </div>

  </div>

</div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>

</body>
</html>
